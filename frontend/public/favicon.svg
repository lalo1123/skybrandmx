<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#105971"/>
      <stop offset="100%" stop-color="#081014"/>
    </linearGradient>
    <linearGradient id="s-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#70D1C6"/>
      <stop offset="100%" stop-color="#6fcff5"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Bold stylized S -->
  <path d="M 46 20
           Q 46 14 40 14
           L 26 14
           Q 16 14 16 24
           Q 16 32 26 32
           L 38 32
           Q 48 32 48 42
           Q 48 52 38 52
           L 22 52
           Q 16 52 16 46"
        fill="none"
        stroke="url(#s-grad)"
        stroke-width="8"
        stroke-linecap="round"/>

  <!-- Orange accent dot (brand pop) -->
  <circle cx="50" cy="48" r="3.5" fill="#FF6B00"/>
</svg>
